<!DOCTYPE html>
<html>
<head>
<style>
    body {
        margin: 0;
        background: transparent;
        font-family: Arial, sans-serif;
    }

    #container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    svg {
        overflow: visible;
    }

    .axis-label {
        font-size: 15px;
        font-weight: 600;
        fill: #333;
    }

    .grid {
        fill: none;
        stroke: #dbe3f5;
        stroke-width: 1.5;
    }

    .spider-area {
        fill: rgba(43,79,201,0.25);
        stroke: #2b4fc9;
        stroke-width: 4;
        stroke-linejoin: round;
    }

    .point {
        fill: #2b4fc9;
        stroke: white;
        stroke-width: 3;
        cursor: pointer;
    }

    .tooltip {
        position: absolute;
        padding: 8px 12px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        font-size: 14px;
        pointer-events: none;
        display: none;
    }

</style>
</head>

<div id="container">
    <svg width="420" height="420"></svg>
    <div class="tooltip"></div>
</div>


<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<script>

const values = __VALUES__;


const labels = [
    "Desirability",
    "Viability",
    "Feasibility",
    "Social Sentiment",
    "Reviews Rating"
];


const rawValues = [
    values.desirability,
    values.viability,
    values.feasibility,
    values.social_sentiment,
    values.reviews_rating
];


// normalize to 0-100

const normalized = [
    values.desirability,
    values.viability,
    values.feasibility,

    // -1 to 1 -> 0 to 100
    ((values.social_sentiment + 1) / 2) * 100,

    // 1 to 5 -> 0 to 100
    ((values.reviews_rating - 1) / 4) * 100
];



const svg = d3.select("svg");

const width = 420;
const height = 420;

const center = width/2;

const radius = 150;


const angleSlice = Math.PI * 2 / labels.length;


// radar scale

const scale = d3.scaleLinear()
    .domain([0,100])
    .range([0,radius]);



// draw grid

for(let level=1; level<=5; level++){

    let r = radius * level/5;

    let points=[];

    for(let i=0;i<labels.length;i++){

        let angle = i*angleSlice - Math.PI/2;

        points.push([
            center + r*Math.cos(angle),
            center + r*Math.sin(angle)
        ]);

    }

    svg.append("polygon")
        .attr("points",
            points.map(d=>d.join(",")).join(" ")
        )
        .attr("class","grid");
}



// axes

labels.forEach((label,i)=>{

    let angle=i*angleSlice-Math.PI/2;


    svg.append("line")
        .attr("x1",center)
        .attr("y1",center)
        .attr("x2",
            center+radius*Math.cos(angle)
        )
        .attr("y2",
            center+radius*Math.sin(angle)
        )
        .attr("class","grid");



    svg.append("text")
        .attr("x",
            center+(radius+35)*Math.cos(angle)
        )
        .attr("y",
            center+(radius+35)*Math.sin(angle)
        )
        .attr("text-anchor","middle")
        .attr("class","axis-label")
        .text(label);

});



// polygon points

function getPoints(data){

    return data.map((v,i)=>{

        let angle=i*angleSlice-Math.PI/2;

        let r=scale(v);

        return [
            center+r*Math.cos(angle),
            center+r*Math.sin(angle)
        ];

    });

}



let points=getPoints(normalized);



svg.append("polygon")
    .attr("points",
        points.map(d=>d.join(",")).join(" ")
    )
    .attr("class","spider-area");



// points

const tooltip=d3.select(".tooltip");


points.forEach((p,i)=>{


    svg.append("circle")
        .attr("cx",p[0])
        .attr("cy",p[1])
        .attr("r",9)
        .attr("class","point")

        .on("mouseover",function(){

            d3.select(this)
                .transition()
                .attr("r",15);


            tooltip
                .style("display","block")
                .html(
                    `<b>${labels[i]}</b><br>
                     ${rawValues[i]}`
                );

        })

        .on("mousemove",function(event){

            tooltip
                .style("left",
                    event.pageX+15+"px"
                )
                .style("top",
                    event.pageY+15+"px"
                );

        })


        .on("mouseout",function(){

            d3.select(this)
                .transition()
                .attr("r",9);

            tooltip.style("display","none");

        });


});

</script>

</body>
</html>
