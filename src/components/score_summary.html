<!DOCTYPE html>
<html>

<head>

<style>

body {
    margin:0;
    background:transparent;
    font-family:Arial, sans-serif;
}


.container {
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
}


.score {
    font-size:110px;
    font-weight:800;
    color:#2b4fc9;
    cursor:pointer;
    transition:transform .3s ease;
    user-select:none;
}


.score:hover {
    transform:scale(1.08);
}


.subtitle {
    font-size:18px;
    color:#666;
    margin-top:-5px;
}


.chart {
    width:95%;
    max-width:350px;
    margin-top:20px;
    display:none;
}


.bar-bg {
    fill:#e3e8f7;
}


.bar {
    fill:#2b4fc9;
}


.label {
    font-size:18px;
    fill:#333;
    font-weight:600;
}


.value {
    font-size:18px;
    fill:#2b4fc9;
    font-weight:bold;
}

.score-wrapper {
    position: relative;
    display: inline-block;
}

.score {
    font-size: 88px;
    font-weight: 700;
}

.info-icon {
    position: absolute;
    bottom: -4px;
    right: -33px;
    width: 30px;
    height: 30px;
    font-size: 24px;
    font-style: italic;
    font-weight: 600;
    color: #6b8fe0;
    background-color: #eef0f5;
    border-radius: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}


</style>

</head>


<body>


<div class="container">


    <div id="score" class="score-wrapper">
        <div id="score" class="score">
            __AVERAGE__%
        </div>
        <span class="info-icon" title="How this score is calculated">i</span>
    </div>

    <div class="subtitle">
        Success Rate
    </div>


    <div id="chart" class="chart">

        <svg width="100%" height="260"></svg>

    </div>


</div>



<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>


<script>


const data = __DATA__;


const scoreElement =
    document.getElementById("score");


const chart =
    document.getElementById("chart");



let opened=false;



scoreElement.onclick=function(){


    if(opened)
        return;


    opened=true;


    chart.style.display="block";


    d3.select(chart)
        .style("opacity",0)
        .transition()
        .duration(500)
        .style("opacity",1);



    drawBars();


};





function drawBars(){


const svg=d3.select("svg");


const width=350;
const height=260;


const margin={
    top:20,
    right:35,
    bottom:20,
    left:120
};



const innerWidth=
    width-margin.left-margin.right;


const scale=d3.scaleLinear()
    .domain([0,100])
    .range([0,innerWidth]);



const items=[

    {
        name:"Desirability",
        value:data.desirability
    },

    {
        name:"Viability",
        value:data.viability
    },

    {
        name:"Feasibility",
        value:data.feasibility
    }

];



const g=svg.append("g")
    .attr(
        "transform",
        `translate(${margin.left},${margin.top})`
    );



items.forEach((item,i)=>{


let y=i*70;



// label

g.append("text")
.attr("x",-20)
.attr("y",y+25)
.attr("text-anchor","end")
.attr("class","label")
.text(item.name);



// background

g.append("rect")
.attr("x",0)
.attr("y",y)
.attr("height",35)
.attr("rx",18)
.attr("width",innerWidth)
.attr("class","bar-bg");



// animated bar

g.append("rect")
.attr("x",0)
.attr("y",y)
.attr("height",35)
.attr("rx",18)
.attr("width",0)
.attr("class","bar")

.transition()
.duration(1000)
.delay(i*200)
.attr("width",
    scale(item.value)
);



// value

g.append("text")
.attr("x",innerWidth+15)
.attr("y",y+25)
.attr("class","value")
.text("0")

.transition()
.duration(1000)
.delay(i*200)

.tween("text",function(){

let node=this;

let interpolate=d3.interpolateNumber(
    0,
    item.value
);


return function(t){

node.textContent=
Math.round(interpolate(t))+"%";

};

});


});



}

</script>


</body>

</html>
